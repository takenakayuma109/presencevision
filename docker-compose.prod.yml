# PresenceVision Production Docker Compose
# Target: Hetzner CPX32 (4 vCPU, 8GB RAM, 160GB SSD) - Helsinki (hel1-dc2)
# Server IP: 77.42.32.52
# Ollama runs CPU-only (no GPU on CPX32)

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: presencevision
      POSTGRES_USER: ${POSTGRES_USER:-pvuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pvuser} -d presencevision"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: always
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-llama3.2} && wait"]
    # No GPU reservation — Hetzner CPX32 is CPU-only (8GB total)
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  engine:
    build: ./engine-server
    environment:
      - ENGINE_PORT=4000
      - ENGINE_API_KEY=${ENGINE_API_KEY:?Set ENGINE_API_KEY in .env}
      - FRONTEND_URL=${FRONTEND_URL:-https://presencevision-rho.vercel.app}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - BROWSER_CONCURRENCY=${BROWSER_CONCURRENCY:-3}
      - BROWSER_HEADLESS=true
      - ENGINE_CYCLE_INTERVAL_MS=${ENGINE_CYCLE_INTERVAL_MS:-21600000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pvuser}:${POSTGRES_PASSWORD}@postgres:5432/presencevision
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    volumes:
      - engine-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    depends_on:
      engine:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  certbot:
    image: certbot/certbot
    restart: always
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  postgres-data:
  ollama-data:
  engine-data:
  certbot-etc:
  certbot-var:
  certbot-webroot:
