worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # --------------------------------------------------------------------------
    # Gzip Compression
    # --------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # --------------------------------------------------------------------------
    # Rate Limiting
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # --------------------------------------------------------------------------
    # Upstream — Engine Server
    # --------------------------------------------------------------------------
    upstream engine {
        server engine:4000;
    }

    # --------------------------------------------------------------------------
    # HTTP -> HTTPS redirect + ACME challenge
    # --------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------------------------
    # HTTPS Server
    # --------------------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL certificates (managed by certbot)
        ssl_certificate     /etc/letsencrypt/live/${DOMAIN:-localhost}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN:-localhost}/privkey.pem;

        # SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # --------------------------------------------------------------------------
        # Security Headers
        # --------------------------------------------------------------------------
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # --------------------------------------------------------------------------
        # Engine API Proxy — /api/engine/*
        # --------------------------------------------------------------------------
        location /api/engine/ {
            limit_req zone=api burst=20 nodelay;

            # Strip /api/engine prefix -> forward to engine as /
            rewrite ^/api/engine/(.*) /$1 break;

            proxy_pass http://engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (for SSE streaming /activities/stream)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Longer timeouts for engine operations
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # Disable buffering for SSE
            proxy_buffering off;
            proxy_cache off;
        }

        # --------------------------------------------------------------------------
        # Engine Health (no auth, no rate limit)
        # --------------------------------------------------------------------------
        location /api/engine/health {
            rewrite ^/api/engine/(.*) /$1 break;
            proxy_pass http://engine;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # --------------------------------------------------------------------------
        # Default — Proxy to Vercel (frontend)
        # --------------------------------------------------------------------------
        location / {
            limit_req zone=general burst=50 nodelay;

            # Proxy to Vercel-hosted frontend
            # Replace with actual Vercel URL or serve static files if self-hosted
            proxy_pass https://presencevision-rho.vercel.app;
            proxy_http_version 1.1;
            proxy_set_header Host presencevision-rho.vercel.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }
    }
}
